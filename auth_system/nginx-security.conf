# VAULTLY NGINX SECURITY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
# 
# Use this file if you run Nginx instead of Apache
# Add to your nginx server block: include /path/to/vaultly-nginx-security.conf;

# ═══════════════════════════════════════════════════════════════════════════════
# HTTPS ENFORCEMENT
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name vaultly.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vaultly.example.com;
    
    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/vaultly.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaultly.example.com/privkey.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # SECURITY HEADERS
    # ═══════════════════════════════════════════════════════════════════════════
    
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.pwnedpasswords.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    
    # Remove server information
    server_tokens off;
    proxy_hide_header Server;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # DENY SENSITIVE FILES
    # ═══════════════════════════════════════════════════════════════════════════
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ \.(env|sql|json|git|htaccess)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # RATE LIMITING
    # ═══════════════════════════════════════════════════════════════════════════
    
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=register:10m rate=3r/m;
    
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        # Forward to PHP
    }
    
    location ~ ^/(login|register)\.php$ {
        limit_req zone=login burst=10 nodelay;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # DISABLE DIRECTORY LISTING
    # ═══════════════════════════════════════════════════════════════════════════
    
    autoindex off;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # PHP-FPM CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security headers for PHP responses
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # COMPRESSION
    # ═══════════════════════════════════════════════════════════════════════════
    
    gzip on;
    gzip_types text/html text/plain text/xml text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # CACHING
    # ═══════════════════════════════════════════════════════════════════════════
    
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.php$ {
        expires -1;
        add_header Cache-Control "private, no-cache, no-store, must-revalidate";
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # LOG CONFIGURATION
    # ═══════════════════════════════════════════════════════════════════════════
    
    access_log /var/log/nginx/vaultly-access.log;
    error_log /var/log/nginx/vaultly-error.log;
}
